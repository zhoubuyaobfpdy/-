
<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>可了个嫑·困难版</title>

<style>
body {
  margin: 0;
  background: #5c4033;
}

/* 背景 */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: url('bg.jpg') no-repeat center center;
  background-size: contain;
  opacity: 0.9;
  z-index: -1;
}

/* 手机框 */
#phone {
  width: 360px;
  height: 640px;
  margin: auto;
  position: absolute;
  inset: 0;

  background: rgba(0,0,0,0.3);
  border-radius: 25px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.5);

  display: flex;
  flex-direction: column;
  align-items: center;
}

/* 标题 */
h2 {
  color: white;
  text-shadow: 0 2px 6px rgba(0,0,0,0.5);
}

/* 游戏区 */
#game-box {
  position: relative;
  width: 320px;
  height: 420px;

  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(6px);

  border-radius: 20px;
  border: 2px solid rgba(255,255,255,0.3);
}

/* 卡牌 */
.card {
  position: absolute;
  width: 60px;
  height: 60px;

  background: linear-gradient(145deg, #d2b48c, #a67c52);
  border-radius: 10px;
  cursor: pointer;

  box-shadow: 4px 4px 8px rgba(0,0,0,0.3),
              -2px -2px 6px rgba(255,255,255,0.3);

  overflow: hidden;
}

.card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.card:active {
  transform: scale(0.9);
}

.covered {
  filter: brightness(0.5);
  cursor: not-allowed;
}

/* 槽位 */
#slot {
  width: 320px;
  height: 80px;
  background: #333;
  margin-top: 10px;
  display: flex;
  align-items: center;
}

.slot-img {
  width: 45px;
  height: 45px;
  margin: 2px;
}

/* 控制 */
#controls {
  color: white;
  font-size: 12px;
  margin-bottom: 8px;
}
</style>
</head>

<body onclick="startMusic()">

<!-- 🎵 音频（关键：预加载 + 复用） -->
<audio id="bgm" src="music.mp3" loop preload="auto"></audio>

<audio id="sfx1" src="soundeffect_Dadadada.mp3" preload="auto"></audio>
<audio id="sfx2" src="soundeffectdrrro.mp3" preload="auto"></audio>

<div id="phone">
  <h2>可了个嫑·困难版</h2>

  <div id="game-box"></div>
  <div id="slot"></div>
</div>

<script>
const gameBox = document.getElementById('game-box');
const slotBox = document.getElementById('slot');

const bgm = document.getElementById('bgm');
const sfx1 = document.getElementById('sfx1');
const sfx2 = document.getElementById('sfx2');

let musicStarted = false;

/* 🎵 音乐启动（必须用户点击触发） */
function startMusic() {
    if (musicStarted) return;
    bgm.volume = 0.4;
    bgm.play().catch(()=>{});
    musicStarted = true;
}

/* 🔊 超关键：无延迟音效播放 */
function playSfx() {
    const sound = Math.random() < 0.5 ? sfx1 : sfx2;
    sound.currentTime = 0;   // ⭐核心：重置
    sound.volume = 0.6;
    sound.play().catch(()=>{});
}

/* 🎮 卡牌数据 */
const cardFiles = ['a.jpg','b.jpg','c.jpg','d.jpg','e.jpg','f.jpg','g.jpg','h.jpg','i.jpg'];

let cards = [];
let slot = [];

/* 初始化 */
function init() {
    let temp = [];

    cardFiles.forEach(file => {
        for(let i=0; i<6; i++) temp.push(file);
    });

    temp.sort(() => Math.random() - 0.5);

    cards = temp.map((img, i) => ({
        id: i,
        img,
        x: Math.random() * (gameBox.clientWidth - 60),
        y: Math.random() * (gameBox.clientHeight - 60),
        layer: Math.floor(Math.random() * 4),
        state: 0
    }));

    render();
}

/* 是否被盖住 */
function isCovered(c1) {
    for(let c2 of cards) {
        if(c2.id === c1.id || c2.state !== 0) continue;

        if(c2.layer > c1.layer &&
           c2.x < c1.x + 60 &&
           c2.x + 60 > c1.x &&
           c2.y < c1.y + 60 &&
           c2.y + 60 > c1.y) {
            return true;
        }
    }
    return false;
}

/* 渲染 */
function render() {
    gameBox.innerHTML = '';

    cards.forEach(c => {
        if(c.state !== 0) return;

        const covered = isCovered(c);

        const div = document.createElement('div');
        div.className = 'card' + (covered ? ' covered' : '');
        div.style.left = c.x + 'px';
        div.style.top = c.y + 'px';
        div.style.zIndex = c.layer;

        div.innerHTML = `<img src="images111/${c.img}">`;

        div.onclick = () => {

            startMusic();
            playSfx();   // ⭐音效

            if(!covered && slot.length < 7) {
                c.state = 1;
                slot.push(c.img);

                checkMatch();
                render();
                checkEnd();
            }
        };

        gameBox.appendChild(div);
    });

    slotBox.innerHTML = slot.map(img =>
        `<img class="slot-img" src="images111/${img}">`
    ).join('');
}

/* 消除 */
function checkMatch() {
    const count = {};
    slot.forEach(i => count[i] = (count[i] || 0) + 1);

    for(let img in count) {
        if(count[img] >= 3) {
            slot = slot.filter(i => i !== img);
            cards.forEach(c => {
                if(c.img === img && c.state === 1) c.state = 2;
            });
        }
    }
}

/* 结束 */

  function checkEnd() {
    if(slot.length >= 7) {
        alert("啊哦...可可跑走啦！再试一次吧！");
        location.reload();
    }
    if(cards.every(c => c.state === 2)) {
        alert("你成功抓住了可可！一起做巧克力吧！");
        location.reload();
    }
}

init();
</script>

</body>
</html>
