<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* ===== 背景 ===== */
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #5c4033;
  overflow: hidden;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: url('bg.jpg') no-repeat center center;
  background-size: contain;
  z-index: -1;
}

/* ===== 外层容器（⭐关键修复：不再拉很长）===== */
#phone {
  width: min(90vw, 420px);
  background: rgba(0,0,0,0.35);
  border-radius: 20px;

  display: flex;
  flex-direction: column;
  align-items: center;

  padding: 10px;
  box-sizing: border-box;

  gap: 8px;
}

/* ===== 控制区 ===== */
#controls-desktop {
  color: white;
  font-size: 12px;
  width: 90%;
}

#controls-mobile {
  display: none;
  gap: 8px;
}

@media (max-width: 768px) {
  #controls-desktop { display: none; }
  #controls-mobile { display: flex; }
}

button {
  flex: 1;
  padding: 8px;
  border-radius: 10px;
  border: none;
  color: white;
  background: rgba(255,255,255,0.2);
}

/* ===== 游戏区域 ===== */
#game-box {
  position: relative;
  width: 100%;
  height: 320px; /* ⭐稳定高度 */
  background: rgba(255,255,255,0.08);
  border-radius: 15px;
  overflow: hidden;
  touch-action: manipulation;
}

/* ===== 卡牌（手感优化但不降低难度）===== */
.card {
  position: absolute;
  width: 60px;
  height: 60px;

  border-radius: 10px;
  overflow: hidden;
  background: #a67c52;

  cursor: pointer;

  transition: transform 0.08s ease, filter 0.08s ease;
}

/* hover：只轻微抬起，不放大 */
.card:hover {
  transform: translateY(-2px);
  filter: brightness(1.08);
  z-index: 10;
}

/* 点击：压下去反馈 */
.card:active {
  transform: scale(0.92);
}

.card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* 遮挡（提高难度） */
.covered {
  pointer-events: none;
  filter: brightness(0.35) saturate(0.7);
  transform: scale(0.98);
}

/* ===== 槽 ===== */
#slot {
  width: 100%;
  height: 80px;

  display: flex;
  align-items: center;
  justify-content: center;

  background: rgba(20,15,10,0.9);
  border-radius: 12px;
}

.slot-img {
  width: 45px;
  height: 45px;
  margin: 3px;
  border-radius: 8px;
}

</style>
</head>

<body onclick="startMusic()" ontouchstart="startMusic()">

<!-- ⭐ 音频（稳定加载） -->
<audio id="bgm" src="music.mp3" loop preload="auto" playsinline></audio>
<audio id="sfx1" src="soundeffect_Dadadada.mp3" preload="auto"></audio>
<audio id="sfx2" src="soundeffectdrrro.mp3" preload="auto"></audio>

<div id="phone">

<div id="controls-desktop">
🎵 音乐
<input type="range" min="0" max="1" step="0.01"
value="0.4" oninput="bgm.volume=this.value">

<br>

🔊 音效
<input type="range" min="0" max="1" step="0.01"
value="0.6" oninput="sfxVolume=this.value">
</div>

<div id="controls-mobile">
<button onclick="toggleMusic()">🎵</button>
<button onclick="toggleSfx()">🔊</button>
</div>

<div id="game-box"></div>
<div id="slot"></div>

</div>

<script>

const gameBox = document.getElementById('game-box');
const slotBox = document.getElementById('slot');

const bgm = document.getElementById('bgm');
const sfx1 = document.getElementById('sfx1');
const sfx2 = document.getElementById('sfx2');

let musicStarted = false;
let sfxVolume = 0.6;
let musicOn = true;
let sfxOn = true;

let cards = [];
let slot = [];

/* ===== ⭐ 音乐稳定修复 ===== */
window.addEventListener('touchstart', () => {
  bgm.load();
}, { once: true });

function startMusic(){
  if(musicStarted) return;

  bgm.volume = 0.4;
  bgm.load();

  const p = bgm.play();

  if(p){
    p.catch(()=>{
      setTimeout(()=>bgm.play().catch(()=>{}), 200);
    });
  }

  musicStarted = true;
}

function toggleMusic(){
  musicOn = !musicOn;
  musicOn ? bgm.play() : bgm.pause();
}

function toggleSfx(){
  sfxOn = !sfxOn;
}

function playSfx(){
  if(!sfxOn) return;
  const s = Math.random() < 0.5 ? sfx1 : sfx2;
  s.currentTime = 0;
  s.volume = sfxVolume;
  s.play().catch(()=>{});
}

/* ===== 初始化 ===== */
const cardFiles = ['a.jpg','b.jpg','c.jpg','d.jpg','e.jpg','f.jpg','g.jpg','h.jpg','i.jpg'];

function init(){

  setTimeout(()=>{

    let temp = [];

    cardFiles.forEach(f=>{
      for(let i=0;i<6;i++) temp.push(f);
    });

    temp.sort(()=>Math.random()-0.5);

    const maxX = gameBox.clientWidth - 60;
    const maxY = gameBox.clientHeight - 60;

    cards = temp.map((img,i)=>({
      id:i,
      img,
      x:Math.random()*maxX,
      y:Math.random()*maxY,
      layer:Math.floor(Math.random()*6),
      state:0
    }));

    render();

  },100);
}

/* ===== 遮挡判断 ===== */
function isCovered(c1){
  for(let c2 of cards){
    if(c2.id===c1.id || c2.state!==0) continue;

    if(c2.layer > c1.layer &&
       Math.abs(c2.x - c1.x) < 55 &&
       Math.abs(c2.y - c1.y) < 55){
      return true;
    }
  }
  return false;
}

/* ===== 渲染 ===== */
function render(){
  gameBox.innerHTML='';

  cards.forEach(c=>{
    if(c.state!==0) return;

    const covered = isCovered(c);

    const div=document.createElement('div');
    div.className='card'+(covered?' covered':'');

    div.style.left=c.x+'px';
    div.style.top=c.y+'px';
    div.style.zIndex=c.layer;

    div.innerHTML=`<img src="images111/${c.img}">`;

    div.onclick=()=>{
      startMusic();
      playSfx();

      if(covered) return;

      if(slot.length<7){
        c.state=1;
        slot.push(c.img);

        checkMatch();
        render();
        checkEnd();
      }
    };

    gameBox.appendChild(div);
  });

  slotBox.innerHTML = slot.map(i=>
    `<img class="slot-img" src="images111/${i}">`
  ).join('');
}

/* ===== 消除 ===== */
function checkMatch(){
  const count={};

  slot.forEach(i=> count[i]=(count[i]||0)+1);

  for(let img in count){
    if(count[img]>=3){
      slot = slot.filter(i=>i!==img);

      cards.forEach(c=>{
        if(c.img===img && c.state===1){
          c.state=2;
        }
      });
    }
  }
}

/* ===== 结束 ===== */
function checkEnd(){

  if(slot.length>=7){
    setTimeout(()=>{
      alert("啊哦...可可跑走啦！再试一次吧！");
      location.reload();
    },200);
  }

  if(cards.every(c=>c.state===2)){
    setTimeout(()=>{
      alert("你成功抓住了可可！一起做巧克力吧！");
      location.reload();
    },200);
  }
}

init();

</script>

</body>
</html>
