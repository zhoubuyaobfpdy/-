<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>可了个嫑·困难版</title>

<style>

/* ================= 背景与居中 ================= */
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #5c4033;
  overflow: hidden;
}

/* ⭐ 背景不裁切 */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: url('bg.jpg') no-repeat center center;
  background-size: contain;
  background-color: #5c4033;
  z-index: -1;
  opacity: 0.95;
}

/* ================= 手机容器 ================= */
#phone {
  width: 360px;
  height: 640px;

  background: rgba(0,0,0,0.35);
  border-radius: 25px;

  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

/* 标题 */
h2 {
  color: white;
  margin: 6px 0;
}

/* ================= 控制区 ================= */
#controls {
  color: white;
  font-size: 12px;
  margin-bottom: 8px;
  width: 90%;
}

/* ================= 游戏区 ================= */
#game-box {
  position: relative;
  width: 320px;
  height: 420px;

  background: rgba(255,255,255,0.12);
  border-radius: 18px;

  overflow: hidden;
}

/* ================= 卡牌 ================= */
.card {
  position: absolute;
  width: 60px;
  height: 60px;

  border-radius: 12px;
  overflow: hidden;

  background: #a67c52;
}

.card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.covered {
  filter: brightness(0.5);
  pointer-events: none;
}

/* ================= 槽位 ================= */
#slot {
  width: 320px;
  height: 85px;

  margin-top: 10px;

  display: flex;
  align-items: center;

  background: rgba(30,20,15,0.9);
  border-radius: 14px;
  padding: 4px;
}

.slot-img {
  width: 45px;
  height: 45px;
  margin: 2px;
  border-radius: 8px;
}

/* ================= 响应式 ================= */
@media (max-width: 768px) {
  #phone {
    width: 95vw;
    height: 95vh;
  }
}

</style>
</head>

<body onclick="startMusic()">

<!-- 音频 -->
<audio id="bgm" src="music.mp3" loop></audio>
<audio id="sfx1" src="soundeffect_Dadadada.mp3"></audio>
<audio id="sfx2" src="soundeffectdrrro.mp3"></audio>

<div id="phone">

<h2>可了个嫑·困难版</h2>

<!-- 控制 -->
<div id="controls">
🎵 音乐：
<input type="range" min="0" max="1" step="0.01"
value="0.4" oninput="bgm.volume=this.value">

<br>

🔊 音效：
<input type="range" min="0" max="1" step="0.01"
value="0.6" oninput="sfxVolume=this.value">
</div>

<div id="game-box"></div>
<div id="slot"></div>

</div>

<script>

const gameBox = document.getElementById('game-box');
const slotBox = document.getElementById('slot');

const bgm = document.getElementById('bgm');
const sfx1 = document.getElementById('sfx1');
const sfx2 = document.getElementById('sfx2');

let musicStarted = false;
let sfxVolume = 0.6;

let slot = [];
let cards = [];

/* ================= 音乐 ================= */
function startMusic(){
  if(musicStarted) return;
  bgm.volume = 0.4;
  bgm.play().catch(()=>{});
  musicStarted = true;
}

/* ================= 音效 ================= */
function playSfx(){
  const s = Math.random() < 0.5 ? sfx1 : sfx2;
  s.currentTime = 0;
  s.volume = sfxVolume;
  s.play().catch(()=>{});
}

/* ================= 初始化 ================= */
const cardFiles = ['a.jpg','b.jpg','c.jpg','d.jpg','e.jpg','f.jpg','g.jpg','h.jpg','i.jpg'];

function init(){
  let temp = [];

  cardFiles.forEach(f=>{
    for(let i=0;i<6;i++) temp.push(f);
  });

  temp.sort(()=>Math.random()-0.5);

  cards = temp.map((img,i)=>({
    id:i,
    img,
    x:Math.random()*250,
    y:Math.random()*350,
    layer:Math.floor(Math.random()*6),
    state:0
  }));

  render();
}

/* ================= 遮挡判断 ================= */
function isCovered(c1){
  for(let c2 of cards){
    if(c2.id===c1.id || c2.state!==0) continue;

    if(c2.layer > c1.layer &&
       Math.abs(c2.x - c1.x) < 55 &&
       Math.abs(c2.y - c1.y) < 55){
      return true;
    }
  }
  return false;
}

/* ================= 渲染 ================= */
function render(){
  gameBox.innerHTML='';

  cards.forEach(c=>{
    if(c.state!==0) return;

    const covered = isCovered(c);

    const div=document.createElement('div');
    div.className='card' + (covered ? ' covered' : '');

    div.style.left=c.x+'px';
    div.style.top=c.y+'px';
    div.style.zIndex=c.layer;

    div.innerHTML=`<img src="images111/${c.img}">`;

    div.onclick=()=>{

      startMusic();
      playSfx();

      if(covered) return;

      if(slot.length < 7){
        c.state = 1;
        slot.push(c.img);

        checkMatch();
        render();
        checkEnd();
      }
    };

    gameBox.appendChild(div);
  });

  slotBox.innerHTML = slot.map(i=>`
    <img class="slot-img" src="images111/${i}">
  `).join('');
}

/* ================= 消除 ================= */
function checkMatch(){
  const count={};

  slot.forEach(i=>{
    count[i]=(count[i]||0)+1;
  });

  for(let img in count){
    if(count[img] >= 3){
      slot = slot.filter(i => i !== img);

      cards.forEach(c=>{
        if(c.img===img && c.state===1){
          c.state=2;
        }
      });
    }
  }
}

/* ================= 结束 ================= */
function checkEnd(){

  if(slot.length >= 7){
    setTimeout(()=>{
      alert("啊哦...可可跑走啦！再试一次吧！");
      location.reload();
    },200);
  }

  if(cards.every(c=>c.state===2)){
    setTimeout(()=>{
      alert("你成功抓住了可可！一起做巧克力吧！");
      location.reload();
    },200);
  }
}

init();

</script>

</body>
</html>
