<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>可了个嫑</title>

<style>

/* ===== 字体 ===== */
body {
  font-family: "Arial Rounded MT Bold","PingFang SC",sans-serif;
}

/* ===== 背景 ===== */
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #5c4033;
  overflow: hidden;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: url('bg.jpg') no-repeat center center;
  background-size: contain;
  z-index: -1;
}

/* ===== 封面 ===== */
#cover {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.75);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 20px;
  z-index: 999;
  color: white;
}

.cover-btn {
  padding: 14px 26px;
  border-radius: 16px;
  border: none;
  cursor: pointer;
  background: #7a4a2d;
  color: white;
  transition: 0.2s;
}

.cover-btn:hover { transform: scale(1.08); }
.cover-btn:active { transform: scale(0.92); }

/* ===== 主体 ===== */
#phone {
  width: min(90vw, 420px);
  background: rgba(0,0,0,0.35);
  border-radius: 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 10px;
  gap: 8px;
}

/* ===== 标题 ===== */
.level-title {
  color: #fff;
  font-size: 18px;
  font-weight: bold;
}

/* ===== 进度条 ===== */
#bar {
  width: 100%;
  height: 10px;
  background: rgba(255,255,255,0.2);
  border-radius: 20px;
  overflow: hidden;
}

#bar-inner {
  height: 100%;
  width: 100%;
  background: #c08a5b;
  transition: width 1s linear;
}

/* ===== 控制 ===== */
#controls {
  width: 100%;
  color: white;
  font-size: 12px;
}

input[type="range"] {
  accent-color: #8b5e3c;
}

/* ===== 游戏区 ===== */
#game-box {
  position: relative;
  width: 100%;
  height: 320px;
  background: rgba(255,255,255,0.08);
  border-radius: 15px;
  overflow: hidden;
}

/* ===== 卡牌（图片版恢复）===== */
.card {
  position: absolute;
  width: 60px;
  height: 60px;

  border-radius: 10px;
  cursor: pointer;

  background: #a67c52;

  transition: 0.08s;
  box-shadow: 0 4px 8px rgba(0,0,0,0.25);
}

.card:hover { transform: translateY(-2px); }
.card:active { transform: scale(0.9); }

.card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* 遮挡 */
.covered {
  pointer-events: none;
  filter: brightness(0.35);
  transform: scale(0.98);
}

/* ===== 槽 ===== */
#slot {
  width: 100%;
  height: 80px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(20,15,10,0.9);
  border-radius: 12px;
}

.slot-img {
  width: 45px;
  height: 45px;
  margin: 3px;
  border-radius: 8px;
}

</style>
</head>

<body onclick="startMusic()" ontouchstart="startMusic()">

<!-- ===== 封面 ===== -->
<div id="cover">
  <div style="font-size:28px;">可了个嫑</div>

  <button class="cover-btn" onclick="startLevel(1)">🍳 第一关</button>
  <button class="cover-btn" onclick="startLevel(2)">🍫 第二关</button>
</div>

<audio id="bgm" src="music.mp3" loop></audio>

<div id="phone">

<div class="level-title" id="title">未开始</div>

<div id="bar"><div id="bar-inner"></div></div>

<div id="controls">
🎵 <input type="range" min="0" max="1" step="0.01" value="0.4" oninput="bgm.volume=this.value">
🔊 <input type="range" min="0" max="1" step="0.01" value="0.6">
</div>

<div id="game-box"></div>
<div id="slot"></div>

</div>

<script>

const cover = document.getElementById('cover');
const title = document.getElementById('title');
const bar = document.getElementById('bar-inner');
const gameBox = document.getElementById('game-box');
const slotBox = document.getElementById('slot');
const bgm = document.getElementById('bgm');

let level = 0;
let time = 0;
let timer = null;

let cards = [];
let slot = [];

/* ===== 音乐 ===== */
function startMusic(){
  bgm.play().catch(()=>{});
}

/* ===== 开始关卡 ===== */
function startLevel(lv){

  level = lv;
  cover.style.display = "none";

  slot = [];
  cards = [];

  title.innerText = lv === 1 ? "🍳 第一关" : "🍫 第二关";

  time = 120;

  generate();
  startTimer();
}

/* ===== 计时 ===== */
function startTimer(){
  clearInterval(timer);

  timer = setInterval(()=>{

    time--;

    bar.style.width = (time/120)*100 + "%";

    if(time <= 0){
      failGame();
    }

  },1000);
}

/* ===== 失败 ===== */
function failGame(){
  clearInterval(timer);
  alert("啊哦...可可跑走啦！再试一次吧！");
  location.reload();
}

/* ===== 生成（图片恢复版）===== */
function generate(){

  const files = ['a.jpg','b.jpg','c.jpg','d.jpg','e.jpg','f.jpg','g.jpg','h.jpg','i.jpg'];

  let temp = [];

  let count = level === 1 ? 18 : 30;

  for(let i=0;i<count;i++){
    temp.push(files[Math.floor(Math.random()*files.length)]);
  }

  temp.sort(()=>Math.random()-0.5);

  const maxX = gameBox.clientWidth - 60;
  const maxY = gameBox.clientHeight - 60;

  cards = temp.map((img,i)=>({
    id:i,
    img,
    x:Math.random()*maxX,
    y:Math.random()*maxY,
    layer:Math.floor(Math.random()*(level===1?3:6)),
    state:0
  }));

  render();
}

/* ===== 遮挡 ===== */
function isCovered(c1){
  return cards.some(c2 =>
    c2.id !== c1.id &&
    c2.state === 0 &&
    c2.layer > c1.layer &&
    Math.abs(c2.x - c1.x) < 55 &&
    Math.abs(c2.y - c1.y) < 55
  );
}

/* ===== 渲染（图片版）===== */
function render(){

  gameBox.innerHTML = "";

  cards.forEach(c=>{
    if(c.state !== 0) return;

    const covered = isCovered(c);

    const div = document.createElement("div");
    div.className = "card" + (covered ? " covered" : "");

    div.style.left = c.x + "px";
    div.style.top = c.y + "px";
    div.style.zIndex = c.layer;

    div.innerHTML = `<img src="images111/${c.img}">`;

    div.onclick = ()=>{

      if(covered) return;

      c.state = 1;
      slot.push(c.img);

      checkMatch();
      render();
      checkWin();
    };

    gameBox.appendChild(div);
  });

  slotBox.innerHTML = slot.map(i=>`<img class="slot-img" src="images111/${i}">`).join("");
}

/* ===== 三消 ===== */
function checkMatch(){

  let count = {};

  slot.forEach(i=>{
    count[i] = (count[i]||0)+1;
  });

  for(let k in count){
    if(count[k] >= 3){

      slot = slot.filter(i => i !== k);

      cards.forEach(c=>{
        if(c.img === k && c.state === 1){
          c.state = 2;
        }
      });
    }
  }
}

/* ===== 胜利 ===== */
function checkWin(){

  if(cards.every(c => c.state !== 0)){

    clearInterval(timer);

    if(level === 1){
      setTimeout(()=>startLevel(2),500);
    } else {
      setTimeout(()=>{
        alert("你成功抓住了可可！一起做巧克力吧！");
        location.reload();
      },500);
    }
  }
}

</script>

</body>
</html>
