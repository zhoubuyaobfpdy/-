<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>可了个嫑·困难版</title>

<style>
body {
  margin: 0;
  background: #5c4033;
}

/* 背景 */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: url('bg.jpg') no-repeat center center;
  background-size: contain;
  opacity: 0.9;
  z-index: -1;
}

/* 手机框 */
#phone {
  width: 360px;
  height: 640px;
  margin: auto;
  position: absolute;
  inset: 0;

  background: rgba(0,0,0,0.3);
  border-radius: 25px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.5);

  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

h2 {
  color: white;
}

/* 控制区 */
#controls {
  color: white;
  font-size: 12px;
  margin-bottom: 10px;
}

#game-box {
  position: relative;
  width: 320px;
  height: 420px;

  background: rgba(255,255,255,0.15);
  border-radius: 20px;
}

/* 卡牌 */
.card {
  position: absolute;
  width: 60px;
  height: 60px;
  border-radius: 10px;
  overflow: hidden;
}

.card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* 槽位 */
#slot {
  width: 320px;
  height: 80px;
  background: #333;
  margin-top: 10px;
  display: flex;
  align-items: center;
}

.slot-img {
  width: 45px;
  height: 45px;
  margin: 2px;
}
</style>
</head>

<body onclick="startMusic()">

<!-- 音频 -->
<audio id="bgm" src="music.mp3" loop></audio>
<audio id="sfx1" src="soundeffect_Dadadada.mp3"></audio>
<audio id="sfx2" src="soundeffectdrrro.mp3"></audio>

<div id="phone">

<h2>可了个嫑·困难版</h2>

<div id="controls">
🎵 音乐：
<input type="range" min="0" max="1" step="0.01" value="0.4" oninput="bgm.volume=this.value">
<br>
🔊 音效：
<input type="range" min="0" max="1" step="0.01" value="0.6" oninput="sfxVolume=this.value">
</div>

<div id="game-box"></div>
<div id="slot"></div>

</div>

<script>

const gameBox = document.getElementById('game-box');
const slotBox = document.getElementById('slot');

const bgm = document.getElementById('bgm');
const sfx1 = document.getElementById('sfx1');
const sfx2 = document.getElementById('sfx2');

let musicStarted = false;
let sfxVolume = 0.6;

/* 🎵 音乐启动 */
function startMusic(){
  if(musicStarted) return;
  bgm.volume = 0.4;
  bgm.play().catch(()=>{});
  musicStarted = true;
}

/* 🔊 随机音效 */
function playSfx(){
  const s = Math.random() < 0.5 ? sfx1 : sfx2;
  s.currentTime = 0;
  s.volume = sfxVolume;
  s.play().catch(()=>{});
}

/* 卡牌数据 */
const cardFiles = ['a.jpg','b.jpg','c.jpg','d.jpg','e.jpg','f.jpg','g.jpg','h.jpg','i.jpg'];

let cards = [];
let slot = [];

function init(){
  let temp = [];

  cardFiles.forEach(f=>{
    for(let i=0;i<6;i++) temp.push(f);
  });

  temp.sort(()=>Math.random()-0.5);

  cards = temp.map((img,i)=>({
    id:i,
    img,
    x:Math.random()*260,
    y:Math.random()*360,
    layer:Math.floor(Math.random()*4),
    state:0
  }));

  render();
}

function render(){
  gameBox.innerHTML='';

  cards.forEach(c=>{
    if(c.state!==0) return;

    const div=document.createElement('div');
    div.className='card';
    div.style.left=c.x+'px';
    div.style.top=c.y+'px';
    div.style.zIndex=c.layer;

    div.innerHTML=`<img src="images111/${c.img}">`;

    div.onclick=()=>{

      startMusic();
      playSfx();

      if(slot.length<7){
        c.state=1;
        slot.push(c.img);

        checkMatch();
        render();
        checkEnd();
      }
    };

    gameBox.appendChild(div);
  });

  slotBox.innerHTML = slot.map(i=>`
    <img class="slot-img" src="images111/${i}">
  `).join('');
}

/* 消除 */
function checkMatch(){
  const count={};

  slot.forEach(i=>{
    count[i]=(count[i]||0)+1;
  });

  for(let img in count){
    if(count[img]>=3){
      slot=slot.filter(i=>i!==img);
      cards.forEach(c=>{
        if(c.img===img && c.state===1) c.state=2;
      });
    }
  }
}

/* 🎯 结束提示（你要的版本） */
function checkEnd(){

  if(slot.length>=7){
    setTimeout(()=>{
      alert("啊哦...可可跑走啦！再试一次吧！");
      location.reload();
    },200);
  }

  if(cards.every(c=>c.state===2)){
    setTimeout(()=>{
      alert("你成功抓住了可可！一起做巧克力吧！");
      location.reload();
    },200);
  }
}

init();

</script>

</body>
</html>
