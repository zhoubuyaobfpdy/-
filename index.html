<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* ===== 背景（严格不被覆盖）===== */
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #5c4033;
  overflow: hidden;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: url('bg.jpg') no-repeat center center;
  background-size: contain;
  z-index: -1;
}

/* ===== 核心容器 ===== */
#phone {
  width: min(90vw, 420px);
  aspect-ratio: 9/16;

  background: rgba(0,0,0,0.35);
  border-radius: 20px;

  display: flex;
  flex-direction: column;
  align-items: center;

  padding: 10px;
}

h2 {
  color: white;
  margin: 5px;
}

/* ===== 控制 ===== */
#controls-desktop {
  color: white;
  font-size: 12px;
  width: 90%;
}

#controls-mobile {
  display: none;
  gap: 8px;
}

@media (max-width: 768px) {
  #controls-desktop { display: none; }
  #controls-mobile { display: flex; }
}

button {
  flex: 1;
  padding: 8px;
  border-radius: 10px;
  border: none;
  color: white;
  background: rgba(255,255,255,0.2);
}

/* ===== 游戏区域（🔥这里改短了）===== */
#game-box {
  position: relative;
  width: 100%;

  /* 原来 flex:1 → 改成更短 */
  flex: 0.75;

  background: rgba(255,255,255,0.08); /* 也稍微更淡一点 */
  border-radius: 15px;

  overflow: hidden;
}

/* ===== 卡牌 ===== */
.card {
  position: absolute;
  width: 60px;
  height: 60px;

  border-radius: 10px;
  overflow: hidden;
  background: #a67c52;

  /* ⭐ 关键：让动画更丝滑 */
  transition: transform 0.18s cubic-bezier(.2,.9,.2,1);
}

/* ⭐ hover 弹性放大效果 */
.card:hover {
  transform: scale(1.12);
  z-index: 999;
}

/* 图片 */
.card img {
  width: 100%;
  height: 100%;
  object-fit: cover;

  /* 防止放大太“死板” */
  transition: transform 0.18s cubic-bezier(.2,.9,.2,1);
}

/* 遮挡 */
.covered {
  pointer-events: none;
  filter: brightness(0.5);
}

/* ===== 槽 ===== */
#slot {
  width: 100%;
  height: 80px;

  display: flex;
  align-items: center;
  justify-content: center;

  background: rgba(20,15,10,0.9);
  border-radius: 12px;
}

.slot-img {
  width: 45px;
  height: 45px;
  margin: 3px;
  border-radius: 8px;
}

</style>
</head>

<body onclick="startMusic()">

<audio id="bgm" src="music.mp3" loop preload="auto"></audio>
<audio id="sfx1" src="soundeffect_Dadadada.mp3" preload="auto"></audio>
<audio id="sfx2" src="soundeffectdrrro.mp3" preload="auto"></audio>

<div id="phone">

<h2>可了个嫑·困难版</h2>

<div id="controls-desktop">
🎵 音乐
<input type="range" min="0" max="1" step="0.01"
value="0.4" oninput="bgm.volume=this.value">

<br>

🔊 音效
<input type="range" min="0" max="1" step="0.01"
value="0.6" oninput="sfxVolume=this.value">
</div>

<div id="controls-mobile">
<button onclick="toggleMusic()">🎵</button>
<button onclick="toggleSfx()">🔊</button>
</div>

<div id="game-box"></div>
<div id="slot"></div>

</div>

<script>

/* JS 不动 */

const gameBox = document.getElementById('game-box');
const slotBox = document.getElementById('slot');

const bgm = document.getElementById('bgm');
const sfx1 = document.getElementById('sfx1');
const sfx2 = document.getElementById('sfx2');

let musicStarted = false;
let sfxVolume = 0.6;
let musicOn = true;
let sfxOn = true;

let cards = [];
let slot = [];

function startMusic(){
  if(musicStarted) return;
  bgm.volume = 0.4;
  bgm.play().catch(()=>{});
  musicStarted = true;
}

function toggleMusic(){
  musicOn = !musicOn;
  musicOn ? bgm.play() : bgm.pause();
}

function toggleSfx(){
  sfxOn = !sfxOn;
}

function playSfx(){
  if(!sfxOn) return;
  const s = Math.random() < 0.5 ? sfx1 : sfx2;
  s.currentTime = 0;
  s.volume = sfxVolume;
  s.play().catch(()=>{});
}

const cardFiles = ['a.jpg','b.jpg','c.jpg','d.jpg','e.jpg','f.jpg','g.jpg','h.jpg','i.jpg'];

function init(){

  setTimeout(()=>{

    let temp = [];

    cardFiles.forEach(f=>{
      for(let i=0;i<6;i++) temp.push(f);
    });

    temp.sort(()=>Math.random()-0.5);

    const maxX = gameBox.clientWidth - 60;
    const maxY = gameBox.clientHeight - 60;

    cards = temp.map((img,i)=>({
      id:i,
      img,
      x:Math.random()*maxX,
      y:Math.random()*maxY,
      layer:Math.floor(Math.random()*6),
      state:0
    }));

    render();

  },100);
}

function isCovered(c1){
  for(let c2 of cards){
    if(c2.id===c1.id || c2.state!==0) continue;

    if(c2.layer > c1.layer &&
       Math.abs(c2.x - c1.x) < 55 &&
       Math.abs(c2.y - c1.y) < 55){
      return true;
    }
  }
  return false;
}

function render(){
  gameBox.innerHTML='';

  cards.forEach(c=>{
    if(c.state!==0) return;

    const covered = isCovered(c);

    const div=document.createElement('div');
    div.className='card'+(covered?' covered':'');

    div.style.left=c.x+'px';
    div.style.top=c.y+'px';
    div.style.zIndex=c.layer;

    div.innerHTML=`<img src="images111/${c.img}">`;

    div.onclick=()=>{
      startMusic();
      playSfx();

      if(covered) return;

      if(slot.length<7){
        c.state=1;
        slot.push(c.img);

        checkMatch();
        render();
        checkEnd();
      }
    };

    gameBox.appendChild(div);
  });

  slotBox.innerHTML = slot.map(i=>
    `<img class="slot-img" src="images111/${i}">`
  ).join('');
}

function checkMatch(){
  const count={};

  slot.forEach(i=> count[i]=(count[i]||0)+1);

  for(let img in count){
    if(count[img]>=3){
      slot = slot.filter(i=>i!==img);

      cards.forEach(c=>{
        if(c.img===img && c.state===1){
          c.state=2;
        }
      });
    }
  }
}

function checkEnd(){
  if(slot.length>=7){
    setTimeout(()=>{
      alert("啊哦...可可跑走啦！再试一次吧！");
      location.reload();
    },200);
  }

  if(cards.every(c=>c.state===2)){
    setTimeout(()=>{
      alert("你成功抓住了可可！一起做巧克力吧！");
      location.reload();
    },200);
  }
}

init();

</script>

</body>
</html>
