<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>可了个嫑·困难版</title>

<style>
body {
  margin: 0;
  background: #5c4033;
}

/* 背景 */
body::before {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: url('bg.jpg') no-repeat center center;
  background-size: contain;
  opacity: 0.9;
  z-index: -1;
}

/* 手机框 */
#phone {
  width: 360px;
  height: 640px;

  position: absolute;
  top: 0; bottom: 0;
  left: 0; right: 0;
  margin: auto;

  background: rgba(0,0,0,0.3);
  border-radius: 25px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.5);

  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

/* 标题 */
h2 {
  color: white;
  text-shadow: 0 2px 6px rgba(0,0,0,0.5);
}

/* 控制按钮 */
#controls {
  margin-bottom: 10px;
}

#controls button {
  margin: 0 5px;
  padding: 5px 10px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  background: rgba(255,255,255,0.2);
  color: white;
}

/* 游戏区 */
#game-box {
  position: relative;
  width: 320px;
  height: 420px;

  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(6px);

  border-radius: 20px;
  border: 2px solid rgba(255,255,255,0.3);

  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

/* 卡牌 */
.card {
  position: absolute;
  width: 60px;
  height: 60px;

  background: linear-gradient(145deg, #d2b48c, #a67c52);
  border-radius: 10px;
  cursor: pointer;

  box-shadow: 
    4px 4px 8px rgba(0,0,0,0.3),
    -2px -2px 6px rgba(255,255,255,0.3);

  transition: transform 0.15s;
  overflow: hidden;
}

.card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.card:active {
  transform: scale(0.9);
}

.covered {
  filter: brightness(0.5);
  cursor: not-allowed;
}

/* 槽位 */
#slot {
  width: 320px;
  height: 80px;
  background: #333;
  margin-top: 10px;
  display: flex;
  align-items: center;
}

.slot-img {
  width: 45px;
  height: 45px;
  margin: 2px;
  object-fit: cover;
}

/* 手机适配 */
@media (max-width: 768px) {
  #phone {
    width: 100%;
    height: 100vh;
    border-radius: 0;
  }
}
</style>
</head>

<body onclick="startMusic()">

<!-- 🎵 音频 -->
<audio id="bgm" src="music.mp3" loop></audio>

<div id="phone">
  <h2>可了个嫑·困难版</h2>

  <div id="controls">
    <button onclick="toggleMusic()">🎵 音乐</button>
    <button onclick="toggleSfx()">🔊 音效</button>
  </div>

  <div id="game-box"></div>
  <div id="slot"></div>
</div>

<script>
const gameBox = document.getElementById('game-box');
const slotBox = document.getElementById('slot');
const bgm = document.getElementById('bgm');

let musicStarted = false;
let musicMuted = false;
let sfxMuted = false;

function startMusic() {
    if (musicStarted) return;

    bgm.volume = 0.4;
    bgm.play().catch(()=>{});

    musicStarted = true;
}

/* 🎵 音乐开关 */
function toggleMusic() {
    musicMuted = !musicMuted;

    if (musicMuted) {
        bgm.pause();
    } else {
        bgm.play().catch(()=>{});
    }
}

/* 🔊 音效开关 */
function toggleSfx() {
    sfxMuted = !sfxMuted;
}

/* 🎮 卡牌 */
const cardFiles = ['a.jpg','b.jpg','c.jpg','d.jpg','e.jpg','f.jpg','g.jpg','h.jpg','i.jpg'];

let cards = [];
let slot = [];

function init() {
    let temp = [];

    cardFiles.forEach(file => {
        for(let i=0; i<6; i++) temp.push(file);
    });

    temp.sort(() => Math.random() - 0.5);

    cards = temp.map((img, i) => ({
        id: i,
        img,
        x: Math.random() * (gameBox.clientWidth - 60),
        y: Math.random() * (gameBox.clientHeight - 60),
        layer: Math.floor(Math.random() * 4),
        state: 0
    }));

    render();
}

function isCovered(c1) {
    for(let c2 of cards) {
        if(c2.id === c1.id || c2.state !== 0) continue;

        if(c2.layer > c1.layer &&
           c2.x < c1.x + 60 &&
           c2.x + 60 > c1.x &&
           c2.y < c1.y + 60 &&
           c2.y + 60 > c1.y) {
            return true;
        }
    }
    return false;
}

function render() {
    gameBox.innerHTML = '';

    cards.forEach(c => {
        if(c.state !== 0) return;

        const covered = isCovered(c);

        const div = document.createElement('div');
        div.className = 'card' + (covered ? ' covered' : '');
        div.style.left = c.x + 'px';
        div.style.top = c.y + 'px';
        div.style.zIndex = c.layer;

        div.innerHTML = `<img src="images111/${c.img}">`;

        div.onclick = () => {

            startMusic();

            /* 🔊 音效 */
            if (!sfxMuted) {
                const file = Math.random() < 0.5
                    ? "soundeffect_Dadadada.mp3"
                    : "soundeffectdrrro.mp3";

                const sound = new Audio(file);
                sound.volume = 0.6;
                sound.play().catch(()=>{});
            }

            if(!covered && slot.length < 7) {
                c.state = 1;
                slot.push(c.img);

                checkMatch();
                render();
                checkEnd();
            }
        };

        gameBox.appendChild(div);
    });

    slotBox.innerHTML = slot.map(img =>
        `<img class="slot-img" src="images111/${img}">`
    ).join('');
}

function checkMatch() {
    const count = {};
    slot.forEach(i => count[i] = (count[i] || 0) + 1);

    for(let img in count) {
        if(count[img] >= 3) {
            slot = slot.filter(i => i !== img);
            cards.forEach(c => {
                if(c.img === img && c.state === 1) c.state = 2;
            });
        }
    }
}

function checkEnd() {
    if(slot.length >= 7) {
        alert("可可跑走啦！");
        location.reload();
    }
    if(cards.every(c => c.state === 2)) {
        alert("成功！");
        location.reload();
    }
}

init();
</script>

</body>
</html>
